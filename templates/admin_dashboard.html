<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ecf0f1;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
            color: #2c3e50;
        }

        /* Navbar */
        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background-color: #2980b9;
            padding: 10px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.3s;
        }

        nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        hr {
            margin: 20px auto;
            border: 0;
            height: 1px;
            background-color: #bdc3c7;
            width: 90%;
        }

        /* Buttons */
        .delete-btn { color: red; text-decoration: none; font-weight: bold; }
        .approve-btn { color: green; text-decoration: none; font-weight: bold; }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto 30px;
            padding: 15px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        /* Tables (shared across admin pages) */
        table.data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        table.data-table th, table.data-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
            white-space: nowrap;
        }
        table.data-table th {
            background-color: #f4f6f7;
            color: #2c3e50;
            position: sticky;
            top: 0;
        }
        table.data-table tr:hover {
            background-color: #f9fbfc;
        }

        /* Toolbar / search */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 9px 14px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: #2980b9;
            box-shadow: 0 0 0 2px rgba(41,128,185,0.15);
        }

        /* Small inline add-charge form */
        .charge-form {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .charge-form select, .charge-form input[type="number"], .charge-form input[type="text"] {
            padding: 6px 8px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 13px;
        }
        .charge-form input[type="number"] { width: 80px; }
        .charge-form input[type="text"] { width: 110px; }
        .btn-add {
            background-color: #2980b9;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background-color: #1f6391; }
        .btn-add:disabled { background-color: #95a5a6; cursor: not-allowed; }

        .badge {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-extra { background-color: #fdebd0; color: #b9770e; }
        .badge-guest { background-color: #d6eaf8; color: #1f618d; }
        .total-amt { font-weight: 700; color: #2c3e50; }
        .no-results { text-align: center; color: #7f8c8d; padding: 20px; display: none; }

        /* Responsive Navbar for small screens */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                align-items: center;
            }
            nav a {
                width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <nav>
        <a href="{{ url_for('admin_dashboard') }}">Home</a>
        <a href="{{ url_for('users_list') }}">Users List</a>
        <a href="{{ url_for('mess_cut_list') }}">Mess Cuts</a>
        <a href="{{ url_for('late_mess_list') }}">Late Mess</a>
        <a href="{{ url_for('new_users_list') }}">New Users</a>
        <a href="{{ url_for('admin_guest') }}">Guest / Extras</a>
	  <a href="{{ url_for('add_mess_cut_admin') }}" class="btn btn-warning" onclick="return checkMessCutPassword(event, this.href);">Add Mess Cut</a>

    </nav>
    <script>
        function checkMessCutPassword(event, targetUrl) {
            event.preventDefault();
            const entered = prompt("Enter password to access Add Mess Cut:");
            if (entered === null) {
                // User clicked Cancel
                return false;
            }
            if (entered === "siberia@messcut") {
                window.location.href = targetUrl;
            } else {
                alert("Incorrect password.");
            }
            return false;
        }
    </script>
    <hr>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
